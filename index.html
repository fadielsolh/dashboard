<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCAA Project Portfolio Dashboard</title>
<style>
:root{--purple:#3D1E5F;--orange:#E8610A;--gray:#5A5A5A;--gray-light:#F2F2F2;--gray-mid:#D0D0D0;--gray-pale:#C8C8C8;--bg:#F7F5F2;--white:#FFFFFF;--text:#1A1A1A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:#3D1E5F;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(61,30,95,0.3);}
.header-inner{max-width:1280px;margin:0 auto;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;}
.header-left{display:flex;align-items:center;gap:14px;}
.logo-dots{display:flex;gap:5px;}
.logo-dot{width:9px;height:9px;border-radius:50%;}
.header-title{font-size:19px;font-weight:600;color:white;}
.header-subtitle{font-size:10px;color:rgba(255,255,255,0.5);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.header-right{display:flex;align-items:center;gap:10px;}
.last-updated{font-size:11px;color:rgba(255,255,255,0.45);}
.pdf-btn{background:rgba(232,97,10,0.4);border:1px solid rgba(232,97,10,0.7);color:white;padding:8px 16px;border-radius:6px;font-size:12px;cursor:pointer;font-family:Arial,sans-serif;font-weight:500;}
.pdf-btn:hover{background:#E8610A;}
.main{max-width:1280px;margin:0 auto;padding:2rem;}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:1.75rem;}
.metric-card{background:#fff;border-radius:10px;padding:1.25rem 1.5rem;border-top:3px solid #3D1E5F;box-shadow:0 1px 6px rgba(0,0,0,0.05);}
.metric-card.orange{border-top-color:#E8610A;}
.metric-label{font-size:10px;color:#5A5A5A;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
.metric-value{font-size:52px;font-weight:600;color:#3D1E5F;line-height:1;}
.metric-value.orange{color:#E8610A;}
.charts-row{display:grid;grid-template-columns:1fr 1.6fr;gap:14px;margin-bottom:1.75rem;}
.chart-card{background:#fff;border-radius:10px;padding:1.5rem;box-shadow:0 1px 6px rgba(0,0,0,0.05);}
.chart-label{font-size:10px;color:#5A5A5A;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px;font-weight:500;}
.donut-wrap{display:flex;align-items:center;justify-content:center;gap:24px;margin-top:8px;}
.donut-svg-wrap{flex-shrink:0;width:200px;height:200px;}
.donut-svg-wrap svg{width:100%;height:100%;}
.donut-legend{display:flex;flex-direction:column;gap:10px;}
.donut-legend-item{display:flex;align-items:center;gap:8px;font-size:13px;color:#5A5A5A;}
.donut-legend-dot{width:13px;height:13px;border-radius:3px;flex-shrink:0;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.bar-name{font-size:11px;color:#5A5A5A;width:130px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;}
.bar-track{flex:1;height:18px;background:#F2F2F2;border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;}
.bar-pct{font-size:10px;color:white;font-weight:600;}
.filters-row{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;}
.filter-label{font-size:10px;color:#5A5A5A;text-transform:uppercase;letter-spacing:0.8px;margin-right:4px;}
.filter-btn{background:#fff;border:1px solid #D0D0D0;border-radius:20px;padding:6px 16px;font-size:12px;cursor:pointer;color:#5A5A5A;font-family:Arial,sans-serif;}
.filter-btn.active{background:#3D1E5F;color:white;border-color:#3D1E5F;}
.filter-btn.sp{border-color:#E8610A;color:#E8610A;}
.filter-btn.sp.active{background:#E8610A;color:white;}
.projects-grid{display:flex;flex-direction:column;gap:12px;}
.project-card{background:#fff;border-radius:10px;padding:1.25rem 1.5rem;border-left:4px solid #C8C8C8;box-shadow:0 1px 6px rgba(0,0,0,0.05);}
.project-card.on-track{border-left-color:#3D1E5F;}
.project-card.delayed{border-left-color:#E8610A;}
.project-card.at-risk{border-left-color:#C4983A;}
.project-card.not-started{border-left-color:#C8C8C8;}
.project-card.completed{border-left-color:#3B7A3A;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:12px;}
.project-name{font-size:19px;font-weight:600;color:#3D1E5F;}
.badges{display:flex;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap;}
.badge{font-size:13px;padding:6px 16px;border-radius:20px;font-weight:700;white-space:nowrap;}
.rbadge{font-size:13px;padding:6px 16px;border-radius:20px;font-weight:700;white-space:nowrap;}
.b-on-track{background:#EDE8F5;color:#3D1E5F;}
.b-delayed{background:#FDF0E8;color:#C04A05;}
.b-at-risk{background:#FDF6E0;color:#8B6820;}
.b-not-started{background:#F2F2F2;color:#5A5A5A;}
.b-completed{background:#E6F5E0;color:#2D6B0F;}
.r-high{background:#FCEBEB;color:#A32D2D;}
.r-medium{background:#FDF6E0;color:#8B6820;}
.r-low{background:#EAF3DE;color:#3B6D11;}
.meta-row{display:flex;gap:20px;margin-bottom:10px;flex-wrap:wrap;}
.meta-item{font-size:11px;color:#5A5A5A;}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.progress-track{flex:1;height:5px;background:#F2F2F2;border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;}
.progress-pct{font-size:12px;color:#5A5A5A;min-width:34px;text-align:right;font-weight:500;}
.card-body{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.slbl{font-size:10px;color:#E8610A;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:5px;font-weight:500;}
.stxt{font-size:13px;color:#5A5A5A;line-height:1.6;white-space:pre-line;}
.spon{font-size:13px;color:#000;font-weight:700;line-height:1.6;}
.noact{font-size:13px;color:#C8C8C8;font-style:italic;}
.dbtn{display:inline-flex;align-items:center;gap:6px;margin-top:4px;padding:5px 12px;background:#F2F2F2;border:1px solid #D0D0D0;border-radius:6px;font-size:12px;color:#3D1E5F;text-decoration:none;}
.dbtn:hover{background:#3D1E5F;color:white;}
.risk-section{background:#FEF9F0;border:1px solid #FDE68A;border-radius:8px;padding:12px 14px;margin-top:14px;}
.risk-section-title{font-size:10px;color:#92400E;text-transform:uppercase;letter-spacing:0.6px;font-weight:700;margin-bottom:8px;}
.risk-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.risk-lbl{font-size:10px;color:#B45309;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;font-weight:600;}
.risk-txt{font-size:13px;color:#1A1A1A;line-height:1.6;}
.mit-txt{font-size:13px;color:#065F46;line-height:1.6;font-weight:500;}
.empty{text-align:center;padding:3rem;color:#5A5A5A;font-size:14px;}
.footer{max-width:1280px;margin:0 auto;padding:1.5rem 2rem 2.5rem;display:flex;align-items:center;justify-content:space-between;}
.footer-left{font-size:11px;color:#C8C8C8;}
.footer-right{font-size:14px;color:#3D1E5F;font-weight:500;}
@media(max-width:900px){.summary-grid{grid-template-columns:repeat(2,1fr);}.charts-row{grid-template-columns:1fr;}.card-body{grid-template-columns:1fr;}.risk-row{grid-template-columns:1fr;}.main{padding:1rem;}.header-subtitle{display:none;}.bar-name{width:80px;}}
@media print{
  .header{position:relative;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .header-right,.filters-row{display:none;}
  .project-card{break-inside:avoid;box-shadow:none;}
  .metric-card,.chart-card{box-shadow:none;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .progress-fill,.badge,.rbadge,.bar-fill{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .risk-section{background:#FEF9F0 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;break-inside:avoid;border:1px solid #FDE68A !important;}
  .mit-txt{color:#065F46 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .dbtn{background:none;border:none;padding:2px 0;color:#5A5A5A;display:block;}
  .dbtn::before{content:"\2022  ";}
}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <div class="logo-dots">
        <div class="logo-dot" style="background:#E8610A;"></div>
        <div class="logo-dot" style="background:rgba(255,255,255,0.3);"></div>
      </div>
      <div>
        <div class="header-title">Dubai Culture and Arts Authority</div>
        <div class="header-subtitle">Project Portfolio Dashboard</div>
      </div>
    </div>
    <div class="header-right">
      <span class="last-updated">Last updated: 17 Apr 2026</span>
      <button class="pdf-btn" onclick="window.print()">&#128438; Export PDF</button>
    </div>
  </div>
</header>
<main class="main">
  <div class="summary-grid" id="sg"></div>
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-label">Status breakdown</div>
      <div class="donut-wrap">
        <div class="donut-svg-wrap"><svg id="ds" viewBox="0 0 200 200"></svg></div>
        <div class="donut-legend" id="dl"></div>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-label">Progress by project (%)</div>
      <div id="bc"></div>
    </div>
  </div>
  <div class="filters-row">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" onclick="filt('all',this)">All</button>
    <button class="filter-btn" onclick="filt('On Track',this)">On track</button>
    <button class="filter-btn" onclick="filt('At Risk',this)">At risk</button>
    <button class="filter-btn" onclick="filt('Delayed',this)">Delayed</button>
    <button class="filter-btn" onclick="filt('Not Started',this)">Not started</button>
    <button class="filter-btn" onclick="filt('Completed',this)">Completed</button>
    <button class="filter-btn sp" onclick="filt('sponsor',this)">&#9889; Sponsor action needed</button>
  </div>
  <div class="projects-grid" id="pg"></div>
</main>
<footer class="footer">
  <div class="footer-left">Confidential &#8212; For internal use only</div>
  <div class="footer-right">Dubai Culture &amp; Arts Authority</div>
</footer>
<script>
var SC={"On Track":"#3D1E5F","At Risk":"#C4983A","Delayed":"#E8610A","Completed":"#3B7A3A","Not Started":"#C8C8C8"};
var BC={"on-track":"b-on-track","delayed":"b-delayed","at-risk":"b-at-risk","not-started":"b-not-started","completed":"b-completed"};
var D=[{"name": "Creatopia", "status": "Delayed", "progress": 30, "due": null, "budget": "AED 4,000,000", "updates": "Refined prototype version is under development based on management direction, with expected delivery on Monday 20th April.\nGuidance video is on track for delivery on Monday 20th April.", "sponsor": null, "risk": "Medium", "deliverables": [{"label": "User Journey Video", "url": "https://are01.safelinks.protection.outlook.com/?url=https%3A%2F%2Fyoutu.be%2F929HqPyNLhg&data=05%7C02%7Cc_fadi.elsolh%40dubaiculture.ae%7C62f055d891a6484678f308de9be41be4%7C1ee74fefbf154332b65a6df657279935%7C1%7C0%7C639119601196223069%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C&sdata=cVxMaDr5whSolLAULAstJFVWMMK1bAa4o%2FqUTnza998%3D&reserved=0"}, {"label": "Creatopia Prototype", "url": "https://creatopia-web.arimac.digital/"}], "riskdesc": "Risk of underspending the approved 2026 budget allocation, which may affect project continuity and delivery momentum.", "mitigation": "Initiate the RFP publication process to commit and deploy the allocated budget within the fiscal year."}, {"name": "CCI Fund", "status": "On Track", "progress": 25, "due": null, "budget": null, "updates": "Completed baseline assessment and benchmarking across fund policy and incentives policy streams.\nAnalyzed survey results (~750 responses) and reflected key insights in the baseline assessment.\nInitiated preparation for Stream 3 (cultural investment mandate) and shared data request with relevant stakeholders.\nConducted 1:1 meetings with Antonia Carver (Art Jameel) and Jolaine Frizzel to understand sector challenges.\nDOF shortlisted fund instrument to be delivered Friday 17th April.\nEntities subcommittees and Roles and Responsibilities framework to be delivered Friday 17th April.", "sponsor": null, "risk": null, "deliverables": [{"label": "Shortlisted Instrument - DOF", "url": "https://dubaicaa.sharepoint.com/:p:/r/sites/StrategyCorporateExcellenceDepartment/PMO/Projects/CCI%20Funding%20Program/Shortlisted%20Instruments%20-%20DOF/20260416_DCAA%20Funding%20Attraction%20Program_Shortlist%20of%20Incentives%20%26%20Fundraising%20Instruments_vs.pptx?d=w6bbb1fca46524784a109885f3ea7c680&csf=1&web=1&e=tvcDXi"}, {"label": "Fund Setup and Instruments", "url": "https://dubaicaa.sharepoint.com/:f:/r/sites/StrategyCorporateExcellenceDepartment/PMO/Projects/CCI%20Funding%20Program/WS1%20-%20Arts%20and%20Culture%20Fund%20Set-up?csf=1&web=1&e=Bzod3c"}, {"label": "Incentive Policy Benchmark", "url": "https://dubaicaa.sharepoint.com/:f:/r/sites/StrategyCorporateExcellenceDepartment/PMO/Projects/CCI%20Funding%20Program/WS2%20-%20Private%20Sector%20Incentives%20Policy?csf=1&web=1&e=A000eq"}, {"label": "Survey Results", "url": "https://dubaicaa.sharepoint.com/:p:/r/sites/StrategyCorporateExcellenceDepartment/PMO/Projects/CCI%20Funding%20Program/Creative%20Survey%20Consolidated%20Results/CCI%20Funding%20Attraction_SurveyResults_vs.pptx?d=wfd64d948ed41420c93b22c5aef890fbc&csf=1&web=1&e=OYw46X"}], "riskdesc": null, "mitigation": null}, {"name": "Al Qouz", "status": "Delayed", "progress": 20, "due": null, "budget": null, "updates": "Dubai Municipality submitted landscaping design options for review.\nDCAA submitted feasibility study on commissioning international artists to create public artwork in the Al Qouz Creative Zone.\nDubai Police submitted an update on integrating the Oyoon system to cover the Al Qouz district; budget allocation by DCAA is required to proceed.\nDubai Police submitted an update on managing heavy vehicle traffic flow and expanding parking capacity in the district.\nAl Qouz website User Acceptance Testing (UAT) is currently in progress.", "sponsor": "Budget allocation approval required from DCAA to proceed with Oyoon system integration across the Al Qouz district.", "risk": "Medium", "deliverables": [{"label": "Feasibility Study - International Artists Public Art", "url": "https://dubaicaa.sharepoint.com/:b:/r/sites/StrategyCorporateExcellenceDepartment/PMO/Projects/Dashboard/Project%20Attachments/Al%20Qouz/Feasibility%20Study%20on%20Commissioning%20International%20Artists%20to%20Deliver%20Public%20Art%20in%20Al%20Quoz%20Creative%20Zone-v3.pdf?csf=1&web=1&e=dwsrI4"}, {"label": "Al Qouz Landscaping and Beautification Proposal", "url": "https://dubaicaa.sharepoint.com/:b:/r/sites/StrategyCorporateExcellenceDepartment/PMO/Projects/Dashboard/Project%20Attachments/Al%20Qouz/_%D9%80%20%D8%B9%D8%B1%D8%B6%20%D9%85%D8%B4%D8%B1%D9%88%D8%B9%20%D8%B2%D8%B1%D8%A7%D8%B9%D8%A9%20%D9%88%D8%AA%D8%AC%D9%85%D9%8A%D9%84%20%D9%85%D9%86%D8%B7%D9%82%D8%A9%20%D8%A7%D9%84%D9%82%D9%88%D8%B2%20%D8%A7%D9%84%D8%A7%D8%A8%D8%AF%D8%A7%D8%B9%D9%8A%D8%A9_%D9%85%D8%B1%D9%81%D9%82%20%D9%A1.pdf?csf=1&web=1&e=jHH0Cl"}, {"label": "Tasks and Action Items Sheet", "url": "https://dubaicaa.sharepoint.com/:x:/r/sites/StrategyCorporateExcellenceDepartment/PMO/Projects/Al%20Qouz%20Creative%20Zone/Task%20Sheet/Copy%20of%20%D8%AA%D9%88%D8%B5%D9%8A%D8%A7%D8%AA%20%D9%85%D8%AD%D8%B6%D8%B1%20%D8%A7%D8%AC%D8%AA%D9%85%D8%A7%D8%B9%20%D8%A7%D9%84%D9%84%D8%AC%D9%86%D8%A9%20%D8%A7%D9%84%D8%B9%D9%84%D9%8A%D8%A7%20%D9%84%D9%84%D9%82%D9%88%D8%B2.xlsx?d=w041b9536524741adb16f51436b275fca&csf=1&web=1&e=bUtiBW"}], "riskdesc": null, "mitigation": null}, {"name": "360", "status": "On Track", "progress": 20, "due": null, "budget": null, "updates": "Business Requirements Document (BRD) for venue booking is ready.\nBRD for the lease process is currently under development.\nRequirements gathering for the vacating process is in progress.", "sponsor": null, "risk": null, "deliverables": [], "riskdesc": null, "mitigation": null}, {"name": "City Builder", "status": "On Track", "progress": 10, "due": null, "budget": null, "updates": "Requirements gathering from subject matter experts (SMEs) is in progress.\nFormal communication has been initiated with Ejari to obtain technical requirements for system integration.", "sponsor": null, "risk": null, "deliverables": [], "riskdesc": null, "mitigation": null}, {"name": "Integration with Dubai Indicators", "status": "Delayed", "progress": 10, "due": null, "budget": null, "updates": "Development across all services is complete. The project is pending Dubai Data Authority (DDA) updating their cloud environment to enable the integration.", "sponsor": "Escalation to DDA required to expedite cloud environment update and unblock integration deployment.", "risk": "Low", "deliverables": [], "riskdesc": "Dependency on DDA cloud environment update may cause further delays to integration go-live if not prioritized by DDA.", "mitigation": "Formally escalate to DDA leadership with a clear deadline. Identify an interim workaround to begin partial integration while awaiting full environment readiness."}, {"name": "Dubai Culture Neighborhoods", "status": "Not Started", "progress": 0, "due": null, "budget": null, "updates": "Project is pending receipt of the approved scope and detailed project brief from the relevant stakeholders.", "sponsor": "Project scope and detailed brief required from sponsor to initiate planning and mobilize the project team.", "risk": null, "deliverables": [], "riskdesc": null, "mitigation": null}];
function ss(s){return (s||"").toLowerCase().replace(/ /g,"-");}
function sc(s){return SC[s]||"#C8C8C8";}
function renderAll(p){
  var t=p.length,ok=0,at=0,sp=0;
  for(var i=0;i<p.length;i++){if(p[i].status==="On Track")ok++;if(p[i].status==="Delayed"||p[i].status==="At Risk")at++;if(p[i].sponsor)sp++;}
  document.getElementById("sg").innerHTML=
    "<div class=\"metric-card\"><div class=\"metric-label\">Total projects</div><div class=\"metric-value\">"+t+"</div></div>"+
    "<div class=\"metric-card\"><div class=\"metric-label\">On track</div><div class=\"metric-value\">"+ok+"</div></div>"+
    "<div class=\"metric-card orange\"><div class=\"metric-label\">Needs attention</div><div class=\"metric-value orange\">"+at+"</div></div>"+
    "<div class=\"metric-card orange\"><div class=\"metric-label\">Sponsor action needed</div><div class=\"metric-value orange\">"+sp+"</div></div>";
  var counts={};
  for(var i=0;i<p.length;i++){var s=p[i].status;counts[s]=(counts[s]||0)+1;}
  var ks=Object.keys(counts),total=p.length,cx=100,cy=100,r=80,inn=45,ang=-Math.PI/2,paths="";
  for(var j=0;j<ks.length;j++){
    var s=ks[j],sl=(counts[s]/total)*2*Math.PI;
    var x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang),x2=cx+r*Math.cos(ang+sl),y2=cy+r*Math.sin(ang+sl);
    var ix1=cx+inn*Math.cos(ang),iy1=cy+inn*Math.sin(ang),ix2=cx+inn*Math.cos(ang+sl),iy2=cy+inn*Math.sin(ang+sl);
    var lg=sl>Math.PI?1:0,col=sc(s);
    paths+="<path d=\"M "+ix1+" "+iy1+" L "+x1+" "+y1+" A "+r+" "+r+" 0 "+lg+" 1 "+x2+" "+y2+" L "+ix2+" "+iy2+" A "+inn+" "+inn+" 0 "+lg+" 0 "+ix1+" "+iy1+" Z\" fill=\""+col+"\" stroke=\"white\" stroke-width=\"2\"/>";
    ang+=sl;
  }
  document.getElementById("ds").innerHTML=paths;
  var leg="";
  for(var k=0;k<ks.length;k++){leg+="<div class=\"donut-legend-item\"><div class=\"donut-legend-dot\" style=\"background:"+sc(ks[k])+";\"></div>"+ks[k]+" ("+counts[ks[k]]+")</div>";}
  document.getElementById("dl").innerHTML=leg;
  var sorted=p.slice().sort(function(a,b){return b.progress-a.progress;}),bh="";
  for(var i=0;i<sorted.length;i++){
    var x=sorted[i],col=sc(x.status),nm=x.name.length>20?x.name.substring(0,18)+"...":x.name;
    bh+="<div class=\"bar-row\"><div class=\"bar-name\" title=\""+x.name+"\">"+nm+"</div><div class=\"bar-track\"><div class=\"bar-fill\" style=\"width:"+x.progress+"%;background:"+col+"\"><span class=\"bar-pct\">"+(x.progress>12?x.progress+"%":"")+"</span></div></div><div style=\"font-size:11px;color:#5A5A5A;width:30px;text-align:right;\">"+x.progress+"%</div></div>";
  }
  document.getElementById("bc").innerHTML=bh;
  var grid=document.getElementById("pg");
  if(!p.length){grid.innerHTML="<div class=\"empty\">No projects match this filter.</div>";return;}
  var html="";
  for(var i=0;i<p.length;i++){
    var x=p[i],s=ss(x.status),col=sc(x.status);
    var rb=x.risk?"<span class=\"rbadge r-"+x.risk.toLowerCase()+"\">&#9888; "+x.risk+" Risk</span>":"";
    var mh="";
    if(x.budget)mh+="<div class=\"meta-item\">Budget: <strong>"+x.budget+"</strong></div>";
    var dh="";
    if(x.deliverables&&x.deliverables.length){
      dh="<div style=\"margin-top:10px;\"><div class=\"slbl\">Deliverables</div><div style=\"display:flex;flex-direction:column;gap:5px;margin-top:5px;\">";
      for(var d=0;d<x.deliverables.length;d++){var dl=x.deliverables[d];dh+=dl.url?"<a class=\"dbtn\" href=\""+dl.url+"\" target=\"_blank\">&#128206; "+dl.label+"</a>":"<div class=\"dbtn\" style=\"cursor:default;opacity:0.6;\">&#128206; "+dl.label+"</div>";}
      dh+="</div></div>";
    }
    var rsh="";
    if(x.riskdesc||x.mitigation){
      rsh="<div class=\"risk-section\">"+
        "<div class=\"risk-section-title\">&#9888; Potential Risks and Mitigation</div>"+
        "<div class=\"risk-row\">"+
          "<div><div class=\"risk-lbl\">Risk description</div><div class=\"risk-txt\">"+(x.riskdesc||"No risk description provided.")+"</div></div>"+
          "<div><div class=\"risk-lbl\">Mitigation recommendation</div><div class=\"mit-txt\">"+(x.mitigation||"No mitigation provided.")+"</div></div>"+
        "</div></div>";
    }
    html+="<div class=\"project-card "+s+"\">"+
      "<div class=\"card-top\"><div class=\"project-name\">"+x.name+"</div><div class=\"badges\"><span class=\"badge "+(BC[s]||"")+"\">"+x.status+"</span>"+rb+"</div></div>"+
      (mh?"<div class=\"meta-row\">"+mh+"</div>":"")+
      "<div class=\"progress-row\"><div class=\"progress-track\"><div class=\"progress-fill\" style=\"width:"+x.progress+"%;background:"+col+"\"></div></div><div class=\"progress-pct\">"+x.progress+"%</div></div>"+
      "<div class=\"card-body\">"+
        "<div><div class=\"slbl\">Recent updates</div><div class=\"stxt\">"+(x.updates||"No updates provided.")+"</div></div>"+
        "<div><div class=\"slbl\">Sponsor support needed</div>"+(x.sponsor?"<div class=\"spon\">"+x.sponsor+"</div>":"<div class=\"noact\">No action required</div>")+dh+"</div>"+
      "</div>"+rsh+"</div>";
  }
  grid.innerHTML=html;
}
function filt(type,btn){
  var bs=document.querySelectorAll(".filter-btn");
  for(var i=0;i<bs.length;i++)bs[i].classList.remove("active");
  btn.classList.add("active");
  var f=[];
  if(type==="all"){f=D;}
  else if(type==="sponsor"){for(var i=0;i<D.length;i++){if(D[i].sponsor)f.push(D[i]);}}
  else{for(var i=0;i<D.length;i++){if(D[i].status===type)f.push(D[i]);}}
  renderAll(f);
}
renderAll(D);
</script>
